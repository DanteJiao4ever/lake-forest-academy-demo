name: Validate or deploy learning API

on:
  workflow_dispatch:
    inputs:
      apply_changes:
        description: Build, migrate, and deploy using pre-provisioned GCP resources
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: learning-api-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: backend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: docker build --tag lfa-learning-api:${GITHUB_SHA} .

  deploy:
    if: ${{ inputs.apply_changes }}
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
      MIGRATION_JOB: ${{ vars.GCP_MIGRATION_JOB }}
      SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
      RUNTIME_SA: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
      MIGRATION_SA: ${{ vars.GCP_MIGRATION_SERVICE_ACCOUNT }}
      DB_RUNTIME_SECRET: ${{ vars.GCP_DB_RUNTIME_SECRET }}
      DB_MIGRATION_SECRET: ${{ vars.GCP_DB_MIGRATION_SECRET }}
      CSRF_SECRET: ${{ vars.GCP_CSRF_SECRET }}
      CLAMAV_HOST: ${{ vars.GCP_CLAMAV_HOST }}
      WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      DEPLOY_SA: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      CANDIDATE_TAG: candidate-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Require pre-provisioned configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in PROJECT_ID REGION REPOSITORY SERVICE MIGRATION_JOB SQL_INSTANCE RUNTIME_SA MIGRATION_SA DB_RUNTIME_SECRET DB_MIGRATION_SECRET CSRF_SECRET CLAMAV_HOST WIF_PROVIDER DEPLOY_SA; do
            test -n "${!name:-}" || { echo "Missing production variable: ${name}" >&2; exit 1; }
          done
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
          token_format: access_token
      - uses: google-github-actions/setup-gcloud@v3
      - name: Verify existing resources (never create infrastructure)
        shell: bash
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe "$REPOSITORY" --project "$PROJECT_ID" --location "$REGION" >/dev/null
          gcloud sql instances describe "${SQL_INSTANCE##*:}" --project "$PROJECT_ID" >/dev/null
          for secret in "$DB_RUNTIME_SECRET" "$DB_MIGRATION_SECRET" "$CSRF_SECRET"; do
            gcloud secrets describe "$secret" --project "$PROJECT_ID" >/dev/null
          done
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/learning-api:${{ github.sha }}
      - name: Deploy and run migrations
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          job: ${{ env.MIGRATION_JOB }}
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/learning-api:${{ github.sha }}
          env_vars: |-
            NODE_ENV=production
            DATABASE_SSL=false
            INSTANCE_UNIX_SOCKET=/cloudsql/${{ env.SQL_INSTANCE }}
          secrets: DATABASE_URL=${{ env.DB_MIGRATION_SECRET }}:latest,CSRF_SECRET=${{ env.CSRF_SECRET }}:latest
          flags: >-
            --service-account=${{ env.MIGRATION_SA }}
            --set-cloudsql-instances=${{ env.SQL_INSTANCE }}
            --command=node
            "--args=scripts/migrate.js"
            --tasks=1
            --max-retries=0
            --task-timeout=10m
          wait: true
      - id: deploy-service
        name: Deploy candidate without traffic
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/learning-api:${{ github.sha }}
          no_traffic: true
          tag: ${{ env.CANDIDATE_TAG }}
          env_vars_update_strategy: overwrite
          secrets_update_strategy: overwrite
          env_vars: |-
            NODE_ENV=production
            HOST=0.0.0.0
            DATABASE_SSL=false
            INSTANCE_UNIX_SOCKET=/cloudsql/${{ env.SQL_INSTANCE }}
            ALLOWED_ORIGINS="https://lakeforestacademy.ca,https://www.lakeforestacademy.ca"
            COOKIE_NAME=__Host-lfa_session
            COOKIE_SECURE=true
            CLAMAV_HOST=${{ env.CLAMAV_HOST }}
            CLAMAV_PORT=3310
            CLAMAV_REQUIRED=true
            SUBMISSION_TARGET_ROOT_ID=1vDhdvq7y15q6AEklYR0wq0PZAH2wkcVK
          secrets: DATABASE_URL=${{ env.DB_RUNTIME_SECRET }}:latest,CSRF_SECRET=${{ env.CSRF_SECRET }}:latest
          flags: >-
            --service-account=${{ env.RUNTIME_SA }}
            --set-cloudsql-instances=${{ env.SQL_INSTANCE }}
            --execution-environment=gen2
            --ingress=all
            --allow-unauthenticated
            --min=0
            --max=3
            --concurrency=20
            --memory=512Mi
            --timeout=180s
            "--startup-probe=httpGet.path=/health/ready,timeoutSeconds=5,periodSeconds=5,failureThreshold=24"
            "--liveness-probe=httpGet.path=/health/live,timeoutSeconds=2,periodSeconds=30,failureThreshold=3"
      - id: candidate
        name: Resolve tagged candidate revision
        shell: bash
        run: |
          set -euo pipefail
          service_json="$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format=json)"
          candidate_url="$(jq -er --arg tag "$CANDIDATE_TAG" '.status.traffic[] | select(.tag == $tag) | .url' <<<"$service_json")"
          candidate_revision="$(jq -er --arg tag "$CANDIDATE_TAG" '.status.traffic[] | select(.tag == $tag) | .revisionName' <<<"$service_json")"
          echo "url=$candidate_url" >> "$GITHUB_OUTPUT"
          echo "revision=$candidate_revision" >> "$GITHUB_OUTPUT"
      - name: Probe candidate API, upload dependencies, and browser CORS
        env:
          CANDIDATE_URL: ${{ steps.candidate.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          probe() {
            local path="$1"
            local key="$2"
            local headers="$RUNNER_TEMP/${key}-headers.txt"
            local body="$RUNNER_TEMP/${key}-body.json"
            curl --fail-with-body --silent --show-error \
              --retry 5 --retry-all-errors --retry-delay 3 \
              --connect-timeout 10 --max-time 30 \
              --header "Accept: application/json" \
              --header "Origin: https://lakeforestacademy.ca" \
              --dump-header "$headers" \
              --output "$body" \
              "$CANDIDATE_URL$path"
            jq -e '.status == "ready"' "$body" >/dev/null
            grep -Eiq '^access-control-allow-origin:[[:space:]]*https://lakeforestacademy\.ca\r?$' "$headers"
          }
          probe "/health/ready" "core-ready"
          probe "/health/upload-ready" "upload-ready"
      - name: Promote the verified candidate revision
        env:
          CANDIDATE_REVISION: ${{ steps.candidate.outputs.revision }}
        run: >-
          gcloud run services update-traffic "$SERVICE"
          --project "$PROJECT_ID"
          --region "$REGION"
          --to-revisions="$CANDIDATE_REVISION=100"
      - name: Verify public service after promotion
        shell: bash
        run: |
          set -euo pipefail
          public_url="$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          test -n "$public_url"
          curl --fail-with-body --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 3 \
            --connect-timeout 10 --max-time 30 \
            "$public_url/health/upload-ready" \
            | jq -e '.status == "ready"' >/dev/null
      - name: Deployment summary
        run: echo "Learning API candidate passed core, upload, and CORS probes before promotion." >> "$GITHUB_STEP_SUMMARY"
