name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        env:
          LFA_API_ORIGIN: ${{ vars.LFA_API_ORIGIN }}
          LFA_API_HEALTH_PATH: ${{ vars.LFA_API_HEALTH_PATH }}
          LFA_API_HEALTH_TIMEOUT_MS: ${{ vars.LFA_API_HEALTH_TIMEOUT_MS }}
          LFA_GOOGLE_AUTH_START: ${{ vars.LFA_GOOGLE_AUTH_START }}
          LFA_DRIVE_SYNC_PATH: ${{ vars.LFA_DRIVE_SYNC_PATH }}
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
